<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <title>Frontend Mentor | Blog preview card</title>
  </head>

  <body>
    <main>
      <article class="card">
        <div class="card__image">
          <img
            class="card__illustration"
            src="./images/illustration-article.svg"
            alt="Illustration of an article"
          />
        </div>
        <div class="card__content">
          <p class="card__category">Learning</p>
          <p class="card__publisched">Published 21 Dec 2023</p>
          <h1 class="card__title">HTML & CSS foundations</h1>
          <p class="card__description">
            These languages are the backbone of every website, defining
            structure, content, and presentation.
          </p>
        </div>
        <div class="card__author">
          <img
            class="card__author-image"
            src="./images/image-avatar.webp"
            alt="Avatar of the author"
            width="32"
            height="32"
          />
          <p class="card__author-name">Greg Hooper</p>
        </div>
      </article>

      <div class="attribution">
        Challenge by
        <a
          href="https://www.frontendmentor.io?ref=challenge"
          rel="noopener noreferrer"
          target="_blank"
          >Frontend Mentor</a
        >. Coded by
        <a href="#" rel="noopener noreferrer" target="_blank">Yevhenii</a>.
      </div>
    </main>
  </body>
</html>
